{% extends "base.html" %}

{% block start %}

<div class="main-content">


    <div class="card">
        <h3>Add Employee</h3>
        <p>Fill the employee details</p>
    </div>

    <div class="card">

        <form id="employeeForm">

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">

                <div>
                    <input type="hidden" value="{{request.GET.emp_id}}" id="emp_id">


                    <label>Name</label><br>
                    <input type="text" id="name" value="{{emp_data.name}}" placeholder="Enter name"
                        style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px;">
                </div>

                <div>
                    <label>Age</label><br>
                    <input type="number" id="age"  value="{{emp_data.age}}" placeholder="Enter age"
                        style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px;">
                </div>

                <div>
                    <label>Position</label><br>
                    <input type="text" id="position" value="{{emp_data.position}}" placeholder="Enter position"
                        style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px;">
                </div>

                <div>
                    <label>Salary</label><br>
                    <input type="number" id="salary" value="{{emp_data.salary}}" placeholder="Enter salary"
                        style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px;">
                </div>

            </div>

            <div style="margin-top:20px;">
                <button type="submit"
                    style="background:#6366f1; color:white; border:none; padding:10px 18px; border-radius:6px;">
                    Save Employee
                </button>
            </div>

        </form>

    </div>


</div>

<script>
async function authFetch(url, options = {}) {

    let access = localStorage.getItem("access");
    let refresh = localStorage.getItem("refresh");


    options.headers = {
        ...options.headers,
        "Authorization": "Bearer " + access,
        "Content-Type": "application/json"
    };

    let response = await fetch(url, options);

    // If access token expired
    if (response.status === 401) {

        const refreshResponse = await fetch("http://127.0.0.1:8000/api/refresh/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                refresh: refresh
            })
        });

        const data = await refreshResponse.json();

        // Save new access token
        localStorage.setItem("access", data.access);

        // Retry original request
        options.headers["Authorization"] = "Bearer " + data.access;

        response = await fetch(url, options);
    }

    return response;
}



</script>

<script>

let edit_id  = document.getElementById("emp_id").value;

if (edit_id  === ""){
    edit_id = null
}
// 
console.log(edit_id)

document.getElementById("employeeForm").addEventListener("submit", async function (e) {

    e.preventDefault();

    let employee = {
        name: document.getElementById("name").value,
        age: document.getElementById("age").value,
        position: document.getElementById("position").value,
        salary: document.getElementById("salary").value,
    };

    // ADD EMPLOYEE
    if (edit_id === null) {

        await authFetch("http://127.0.0.1:8000/employee/", {
            method: "POST",
            body: JSON.stringify(employee)
        });

        alert("Employee Added Successfully");

        window.location.href = "/employe_list";
    }

    // UPDATE EMPLOYEE
    else {

        await authFetch(`http://127.0.0.1:8000/employee/${edit_id}/`, {
            method: "PUT",
            body: JSON.stringify(employee)
        });

        edit_id = null;

        alert("Employee edit Successfully");

        window.location.href = "/employe_list";
    }

    document.getElementById("employeeForm").reset();

});


async function get_employee_data() {

    let access = localStorage.getItem("access");
    let refresh = localStorage.getItem("refresh");

    let res = await fetch("http://127.0.0.1:8000/edit_employee/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + access
        },
        body: JSON.stringify({
            emp_id: edit_id
        })
    });

    // If access token expired
    if (res.status === 401) {

        const refresh_res = await fetch("http://127.0.0.1:8000/api/token/refresh/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                refresh: refresh
            })
        });

        const refresh_data = await refresh_res.json();

        // Save new access token
        localStorage.setItem("access", refresh_data.access);

        access = refresh_data.access;

        // Retry request
        res = await fetch("http://127.0.0.1:8000/edit_employee/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + access
            },
            body: JSON.stringify({
                emp_id: edit_id
            })
        });
    }

    const data = await res.json();

    document.getElementById("name").value = data.name;
    document.getElementById("age").value = data.age;
    document.getElementById("position").value = data.position;
    document.getElementById("salary").value = data.salary;
}

if (edit_id !== "") {
    get_employee_data();
}
 
</script>

{% endblock %}
