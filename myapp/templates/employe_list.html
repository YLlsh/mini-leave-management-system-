{% extends "base.html" %}

{% block start %}

<div class="main-content">

    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
        <div>
            <h3>Employees List</h3>
            <p>All registered employees</p>
        </div>

        <div>
            <a href="{% url 'add_employee' %}"
                style="background:#6366f1; color:white; padding:8px 14px; text-decoration:none; border-radius:6px;">
                + Add Employee
            </a>
        </div>
    </div>

    <div class="card">

        <table style="width:100%; border-collapse: collapse;">
            <thead>
                <tr style="background:#f1f5f9;">
                    <th style="padding:10px;">ID</th>
                    <th style="padding:10px;">Name</th>
                    <th style="padding:10px;">Active</th>
                    <th style="padding:10px;">Department</th>
                    <th style="padding:10px;">Action</th>
                </tr>
            </thead>

            <tbody id="employeeTable">
                <!-- Data will come from API -->
            </tbody>

        </table>

    </div>

</div>

<div id="actionModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
">

    <div style="
    background:white;
    padding:30px;
    border-radius:10px;
    width:250px;
    text-align:center;
    ">

        <h3>Employee Action</h3>

        <button style="
        padding:8px 20px;
        margin:10px;
        background:#3b82f6;
           color:white;
        border:none;
        border-radius:5px;
        " onclick="get_emp_id()">Edit</button>

        <button style="
        padding:8px 20px;
        margin:10px;
        background:#ef4444;
        color:white;
        border:none;
        border-radius:5px;
        " onclick="Delete_employee()">Delete</button>

        <br><br>

        <button onclick="closeModal()" style="
        padding:6px 15px;
        background:#64748b;
        color:white;
        border:none;
        border-radius:5px;
        ">Close</button>

    </div>

</div>


<script>
    async function emp_list() {


        const access_token = localStorage.getItem("access");
        const refrrefresh_tokenesh = localStorage.getItem("refresh");

        async function refreshAccessToken() {

            const response = await fetch("http://127.0.0.1:8000/api/refresh/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    refresh: refresh_token
                })
            });

            const data = await response.json();

            localStorage.setItem("access", data.access);

            return data.access;
        }

        let response = await fetch("http://127.0.0.1:8000/employee", {
            method: "GET",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${access_token}`
            }
        });

        if (response.status === 401) {

            access_token = await refreshAccessToken();

            response = await fetch("http://127.0.0.1:8000/employee", {
                method: "GET",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${access_token}`
                }
            });

        }

        const data = await response.json();
        console.log(data)

        const table = document.getElementById("employeeTable");
        table.innerHTML = "";

        data.forEach(emp => {

            table.innerHTML += `
        <tr style="border-bottom:1px solid #e2e8f0;">
            <td style="padding:10px;">${emp.emp_id}</td>
            <td style="padding:10px;">${emp.name}</td>
            <td style="padding:10px;">${emp.is_active}</td>
            <td style="padding:10px;">${emp.position}</td>
            <td style="padding:10px;">
    <a href="#" style="color:#6366f1;" onclick="openModal(${emp.emp_id})">View</a>
</td>
        </tr>
        `;

        });

    }

    emp_list();

    let selected_emp_Id = null;

    function openModal(emp_id) {
        selected_emp_Id = emp_id;
        document.getElementById("actionModal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("actionModal").style.display = "none";
    }



    async function Delete_employee() {

        let access_token = localStorage.getItem("access");
        const refresh_token = localStorage.getItem("refresh");

        async function refreshAccessToken() {

            const response = await fetch("http://127.0.0.1:8000/api/refresh/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    refresh: refresh_token
                })
            });

            const data = await response.json();

            localStorage.setItem("access", data.access);

            return data.access;
        }

        console.log(selected_emp_Id);

        let response = await fetch(`http://127.0.0.1:8000/employee/${selected_emp_Id}/`, {
            method: "DELETE",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${access_token}`
            }
        });


        if (response.status === 401) {

            access_token = await refreshAccessToken();

            response = await fetch(`http://127.0.0.1:8000/employee/${selected_emp_Id}/`, {
                method: "DELETE",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${access_token}`
                }
            });

        }

        if (response.ok) {
            alert("Employee Deleted Successfully");
            closeModal();
            emp_list(); // reload employee list
        }
    }



    function get_emp_id() {

        window.location = `http://127.0.0.1:8000/get_emp_id/${selected_emp_Id}/`
    }

</script>

<script>
   
</script>

{% endblock %}
